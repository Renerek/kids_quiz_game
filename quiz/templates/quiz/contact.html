{% extends "base.html" %}
{% load static %}
{% block title %}Contact Us{% endblock %}
{% block content %}
<div class="container" style="max-width: 500px; margin: 40px auto;">
    <h1 class="big-heading">Contact Us</h1>
    <form method="post" action="">
        {% csrf_token %}
        <div style="margin-bottom:12px;">
            <label for="email" style="display:block;margin-bottom:2px;">Your Email:</label>
            <input type="email" id="email" name="email" required style="width:100%;max-width:350px;padding:12px;font-size:1.1rem;border-radius:9px;border:1.5px solid #007bff;margin-bottom:10px;">
        </div>
        <div style="margin-bottom:12px;">
            <label for="reason" style="display:block;margin-bottom:2px;">Reason for Contacting Us:</label>
            <select id="reason" name="reason" required style="width:40%;font-size:1.4rem;border-radius:9px;border:1.5px solid #007bff;margin-bottom:10px;">
                <option value="">Select a reason...</option>
                <option value="Feedback">Feedback</option>
                <option value="Profile Issue">Profile Related Issue</option>
                <option value="Game Issue">Game Related Issue</option>
                <option value="Account/Password">Account or Password Issue</option>
                <option value="Suggestion">Suggestion</option>
                <option value="Other">Other</option>
            </select>
        </div>
        <div style="margin-bottom:12px;">
            <label for="subject" style="display:block;margin-bottom:2px;">Subject:</label>
            <input type="text" id="subject" name="subject" required style="width:100%;max-width:350px;padding:12px;font-size:1.1rem;border-radius:9px;border:1.5px solid #007bff;margin-bottom:10px;">
        </div>
        <div style="margin-bottom:12px;">
            <label for="message" style="display:block;margin-bottom:2px;">Message:</label>
            <textarea id="message" name="message" rows="4" required style="width:100%;max-width:350px;padding:12px;font-size:1.1rem;border-radius:9px;border:1.5px solid #007bff;margin-bottom:10px;"></textarea>
        </div>
        <button type="submit" style="width:25%;">Send Message</button>
    </form>
    {% if sent %}
        <div class="feedback animate-correct" style="margin-top:20px;">Thank you for your feedback! We'll get back to you soon.</div>
    {% endif %}
</div>
{% endblock %}
