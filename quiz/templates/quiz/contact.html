{% extends "base.html" %}
{% load static %}
{% block title %}Contact Us{% endblock %}
{% block content %}
<div class="container" style="max-width: 500px; margin: 40px auto;">
    <h1 class="big-heading">Contact Us</h1>
    <form method="post" action="">
        {% csrf_token %}
        <label for="email">Your Email:</label>
        <input type="email" id="email" name="email" required style="width:100%;margin-bottom:12px;">
        <label for="subject">Subject:</label>
        <input type="text" id="subject" name="subject" required style="width:100%;margin-bottom:12px;">
        <label for="message">Message:</label>
        <textarea id="message" name="message" rows="5" required style="width:100%;margin-bottom:12px;"></textarea>
        <button type="submit" style="width:100%;">Send Message</button>
    </form>
    {% if sent %}
        <div class="feedback animate-correct" style="margin-top:20px;">Thank you for your feedback! We'll get back to you soon.</div>
    {% endif %}
</div>
{% endblock %}
