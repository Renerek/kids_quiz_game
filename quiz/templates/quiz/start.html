
{% extends "base.html" %}
{% load static %}
{% load i18n %}
{% block title %}Start Quiz{% endblock %}
{% block content %}
<div class="container">
    <div style="text-align: center; margin-bottom: 20px;">
        <img src="{% static 'quiz/images/logo.png' %}" alt="ABCmouse Logo" style="max-width: 180px;">
    </div>
    <h1 class="big-heading">{% trans "Welcome to the Math Quiz!" %}</h1>
    <div class="start-form">
        <img src="{% static 'quiz/images/math_icon.png' %}" alt="Math Icon" class="quiz-icon">
        <form method="post" action="">
            {% csrf_token %}
            <label for="name">{% trans "Enter your name:" %}</label>
            <input type="text" id="name" name="name" placeholder="{% trans 'Your Name' %}" required>
            <label for="mode">{% trans "Select Game Mode:" %}</label>
            <select id="mode" name="mode">
                <option value="mixed">{% trans "Mixed" %}</option>
                <option value="add">{% trans "Addition" %}</option>
                <option value="sub">{% trans "Subtraction" %}</option>
            </select>
            <label for="difficulty">{% trans "Select Difficulty:" %}</label>
            <select id="difficulty" name="difficulty">
                <option value="easy">{% trans "Easy" %}</option>
                <option value="medium">{% trans "Medium" %}</option>
                <option value="hard">{% trans "Hard" %}</option>
            </select>
            <button type="submit">{% trans "Start Quiz" %}</button>
        </form>
    </div>
    <!-- Back to Home button removed -->
    <div style="text-align: center; margin: 30px 0 20px 0;">
        <img src="{% static 'quiz/images/boy-girl-are-reading-books.jpg' %}" alt="Boy and Girl Reading Books" style="max-width: 500px; width: 100%; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.2);" />
    </div>
</div>
{% endblock %}
