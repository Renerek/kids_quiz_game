
{% extends "base.html" %}
{% load static %}
{% load i18n %}
{% block title %}Start Quiz{% endblock %}
{% block content %}
<div class="container">
    <div style="text-align: center; margin-bottom: 20px;">
        <img src="{% static 'quiz/images/logo.png' %}" alt="ABCmouse Logo" style="max-width: 180px;">
    </div>
    <h1 class="big-heading">{% trans "Welcome to the Math Quiz!" %}</h1>
    <div class="start-form">
        <img src="{% static 'quiz/images/math_icon.png' %}" alt="Math Icon" class="quiz-icon">
        <form method="post" action="">
            {% csrf_token %}
            <label for="name">{% trans "Enter your name:" %}</label>
            <input type="text" id="name" name="name" placeholder="{% trans 'Your Name' %}" required>
            
            <div style="display: flex; gap: 20px; align-items: end; margin-top: 20px; justify-content: center;">
                <div style="flex: 0 0 auto;">
                    <label for="mode">{% trans "Mode:" %}</label>
                    <select id="mode" name="mode" style="width: auto; min-width: 200px;" required>
                        <option value="" disabled selected>{% trans "Select Game Mode" %}</option>
                        <option value="mixed">{% trans "Mixed (All Operations)" %}</option>
                        <option value="add">{% trans "Addition" %}</option>
                        <option value="sub">{% trans "Subtraction" %}</option>
                        <option value="mul">{% trans "Multiplication" %}</option>
                        <option value="div">{% trans "Division" %}</option>
                    </select>
                </div>
                <div style="flex: 0 0 auto;">
                    <label for="difficulty">{% trans "Difficulty:" %}</label>
                    <select id="difficulty" name="difficulty" style="width: auto; min-width: 180px;" required>
                        <option value="" disabled selected>{% trans "Select Difficulty" %}</option>
                        <option value="easy">{% trans "Easy (1 minute)" %}</option>
                        <option value="medium">{% trans "Medium (30 seconds)" %}</option>
                        <option value="hard">{% trans "Hard (15 seconds)" %}</option>
                    </select>
                </div>
            </div>
            
            <button type="submit" style="margin-top: 25px;">{% trans "Start Quiz" %}</button>
        </form>
    </div>
    <!-- Back to Home button removed -->
    <div style="text-align: center; margin: 30px 0 20px 0;">
        <img src="{% static 'quiz/images/boy-girl-are-reading-books.jpg' %}" alt="Boy and Girl Reading Books" style="max-width: 500px; width: 100%; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.2);" />
    </div>
</div>
{% endblock %}
