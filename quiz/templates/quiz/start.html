{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start Quiz</title>
    <link rel="stylesheet" href="{% static 'quiz/style.css' %}">
    <link rel="stylesheet" href="{% static 'quiz/extra.css' %}">
    <style>
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            min-height: 100vh;
        }
        .big-heading {
            font-size: 3rem;
            text-align: center;
            margin-top: 20px;
        }
        .start-form {
            background-color: rgba(255, 255, 255, 0.8);
            padding: 30px;
            border-radius: 15px;
            margin: 20px auto;
            max-width: 600px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            color: #333;
            text-shadow: none;
        }
        input[type="text"], select {
            font-size: 1.5rem;
            padding: 10px;
            width: 100%;
            max-width: 400px;
            border: 2px solid #007bff;
            border-radius: 10px;
            margin-top: 10px;
            text-align: center;
        }
        button {
            font-size: 1.2rem;
            margin-top: 20px;
            background-color: #28a745;
            border: none;
            border-radius: 10px;
            padding: 12px 24px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            display: block;
            width: 200px;
            margin: 20px auto;
        }
        button:hover {
            background-color: #218838;
            transform: scale(1.05);
        }
        label {
            font-size: 1.2rem;
            font-weight: bold;
            display: block;
            margin-top: 15px;
        }
        .quiz-icon {
            width: 100px;
            display: block;
            margin: 0 auto 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div style="text-align: center; margin-bottom: 20px;">
            <img src="{% static 'quiz/images/logo.png' %}" alt="ABCmouse Logo" style="max-width: 180px;">
        </div>
        <h1 class="big-heading">Welcome to the Math Quiz!</h1>
        <div class="start-form">
            <img src="{% static 'quiz/images/math_icon.png' %}" alt="Math Icon" class="quiz-icon">
            <form method="post" action="">
                {% csrf_token %}
                <label for="name">Enter your name:</label>
                <input type="text" id="name" name="name" placeholder="Your Name" required>
                <label for="mode">Select Game Mode:</label>
                <select id="mode" name="mode">
                    <option value="mixed">Mixed</option>
                    <option value="add">Addition</option>
                    <option value="sub">Subtraction</option>
                </select>
                <button type="submit">Start Quiz</button>
            </form>
        </div>
        <p><a href="/quiz/" style="display: inline-block; margin-top: 20px; background-color: #0066cc; color: white; padding: 10px 20px; border-radius: 25px; text-decoration: none; font-weight: bold; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2); transition: all 0.3s;">&#8592; Back to Home</a></p>
        
        <div style="text-align: center; margin: 30px 0 20px 0;">
            <img src="{% static 'quiz/images/learning_path.png' %}" alt="Learning Path" style="max-width: 600px; width: 100%; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.2);" />
        </div>
    </div>
</body>
</html>
