
{% extends "base.html" %}
{% load static %}
{% block title %}Start Quiz{% endblock %}
{% block content %}
<div class="container">
    <div style="text-align: center; margin-bottom: 20px;">
        <img src="{% static 'quiz/images/logo.png' %}" alt="ABCmouse Logo" style="max-width: 180px;">
    </div>
    <h1 class="big-heading">Welcome to the Math Quiz!</h1>
    <div class="start-form">
        <img src="{% static 'quiz/images/math_icon.png' %}" alt="Math Icon" class="quiz-icon">
        <form method="post" action="">
            {% csrf_token %}
            <label for="name">Enter your name:</label>
            <input type="text" id="name" name="name" placeholder="Your Name" required>
            <label for="mode">Select Game Mode:</label>
            <select id="mode" name="mode">
                <option value="mixed">Mixed</option>
                <option value="add">Addition</option>
                <option value="sub">Subtraction</option>
            </select>
            <button type="submit">Start Quiz</button>
        </form>
    </div>
    <p><a href="/quiz/" style="display: inline-block; margin-top: 20px; background-color: #0066cc; color: white; padding: 10px 20px; border-radius: 25px; text-decoration: none; font-weight: bold; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2); transition: all 0.3s;">&#8592; Back to Home</a></p>
    <div style="text-align: center; margin: 30px 0 20px 0;">
        <img src="{% static 'quiz/images/boy-girl-are-reading-books.jpg' %}" alt="Boy and Girl Reading Books" style="max-width: 500px; width: 100%; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.2);" />
    </div>
</div>
{% endblock %}
