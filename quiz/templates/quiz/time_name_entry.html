
{% extends "base.html" %}
{% load static %}
{% block title %}Enter Your Name{% endblock %}
{% block content %}
<div class="container">
    <h1 class="big-heading">What Time Is It?</h1>
    <div class="name-container">
        <img src="{% static 'quiz/images/clock.png' %}" alt="Clock" class="clock-icon">
        <h2>Let's Learn About Time!</h2>
        <p>Before we begin, please enter your name:</p>
        <form method="post">
            {% csrf_token %}
            <input type="text" name="name" placeholder="Your Name" required autofocus>
            <input type="hidden" name="name_submit" value="true">
            <button type="submit">Start Game</button>
        </form>
    </div>
    <!-- Back to Home button removed -->
</div>
{% endblock %}
