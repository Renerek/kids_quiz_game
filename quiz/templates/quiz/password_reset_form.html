{% extends 'base.html' %}
{% block title %}Reset Your Password{% endblock %}
{% block content %}
<div class="container" style="max-width:480px;margin-top:40px;">
  <h2>Reset Your Password</h2>
  <p>Enter the email address for your account. If it exists, you'll get a reset link.</p>
  <form method="post" style="display:flex;flex-direction:column;gap:14px;">{% csrf_token %}
    {{ form.email.errors }}
    {{ form.email }}
    <button type="submit" style="padding:12px 16px;border:none;border-radius:8px;background:#2d73ff;color:#fff;font-weight:600;cursor:pointer;">Send Reset Email</button>
  </form>
  <p style="margin-top:16px;"><a href="{% url 'quiz:login' %}">Back to login</a></p>
</div>
{% endblock %}
