{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
  <h2>Set a New Password</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-success">Reset Password</button>
  </form>
  <p class="mt-3"><a href="{% url 'quiz:login' %}">Back to login</a></p>
</div>
{% endblock %}
