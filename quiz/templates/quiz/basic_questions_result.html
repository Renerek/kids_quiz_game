{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Questions Result</title>
    <link rel="stylesheet" href="{% static 'quiz/style.css' %}">
    <style>
        body {
            background-image: url('{% static "quiz/images/background.jpg" %}');
            background-size: cover;
            background-repeat: no-repeat;
            color: white;
            text-shadow: 2px 2px 4px #000000;
            font-family: 'Comic Sans MS', cursive, sans-serif;
        }
        .big-heading {
            font-size: 3rem;
            text-align: center;
            margin-top: 20px;
        }
        .answers-container {
            background-color: rgba(255, 255, 255, 0.8);
            padding: 30px;
            border-radius: 15px;
            margin: 20px auto;
            max-width: 800px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            color: #333;
            text-shadow: none;
        }
        .answer-item {
            margin: 15px 0;
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }
        .answer-question {
            font-weight: bold;
            color: #007bff;
        }
        .answer-value {
            margin-top: 5px;
            font-size: 1.2rem;
        }
        .completed {
            text-align: center;
            font-size: 2rem;
            color: #28a745;
            margin: 30px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="big-heading">All Done!</h1>
        <div class="completed">🎉 Great job answering all the questions! 🎉</div>
        
        <div class="answers-container">
            <h2>Your Answers</h2>
            {% for question, answer in answers.items %}
                <div class="answer-item">
                    <div class="answer-question">{{ question }}</div>
                    <div class="answer-value">{{ answer }}</div>
                </div>
            {% endfor %}
        </div>
        
        <p><a href="/quiz/">&#8592; Back to Home</a></p>
    </div>
</body>
</html>
