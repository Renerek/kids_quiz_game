{% extends 'base.html' %}
{% block title %}Password Reset{% endblock %}
{% block content %}
<div class="container" style="max-width:460px;margin-top:40px;">
  <h2>Reset Your Password</h2>
  <p>Enter the email address associated with your account. We'll send a link to reset your password.</p>
  <form method="post" style="display:flex;flex-direction:column;gap:14px;">{% csrf_token %}
    {{ form.email.errors }}
    <input type="email" name="email" placeholder="Email" required style="padding:10px;border-radius:8px;border:1px solid #ccc;">
    <button type="submit" style="padding:12px 16px;border:none;border-radius:8px;background:#2d73ff;color:#fff;font-weight:600;cursor:pointer;">Send Reset Email</button>
  </form>
  <p style="margin-top:16px;"><a href="{% url 'quiz:login' %}">Back to login</a></p>
</div>
{% endblock %}
